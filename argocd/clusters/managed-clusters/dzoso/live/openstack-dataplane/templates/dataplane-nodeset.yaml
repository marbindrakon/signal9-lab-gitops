{{- $root := . }}
{{- range $group := .Values.dataplaneNodeGroups }}
---
apiVersion: dataplane.openstack.org/v1beta1
kind: OpenStackDataPlaneNodeSet
metadata:
  name: {{ $root.Values.cloudName }}-{{ $group.az }}-{{ $group.role }}
  namespace: openstack
  annotations:
    argocd.argoproj.io/sync-wave: '4'
spec:
  tlsEnabled: true
  services:
    - download-cache
    - bootstrap
    - configure-network
    - validate-network
    - install-os
    - configure-os
    - frr
    - run-os
    - reboot-os
    - ssh-known-hosts
    - install-certs
    - ovn
    - neutron-metadata
    - ovn-bgp-agent
    - ceph-client
    - libvirt
    - nova-custom-ceph-{{ $group.az }}
    - telemetry
  env:
    - name: ANSIBLE_FORCE_COLOR
      value: "True"
    - name: ANSIBLE_TIMEOUT
      value: "60"
    - name: ANSIBLE_SSH_TIMEOUT
      value: "60"
    - name: ANSIBLE_SSH_RETRIES
      value: "60"
  baremetalSetTemplate:
    bmhNamespace: openstack
    bmhLabelSelector:
      oso-role: {{ $group.role }}
      oso-zone: {{ $group.az }}
    ctlplaneInterface: eno1
    cloudUserName: cloud-admin
    passwordSecret:
      name: {{ $root.Values.cloudName }}-password-secret
      namespace: openstack
  nodes:
{{- range $nodeName, $node := $group.nodes }}
{{- if $node.enabled }}
    {{ $nodeName }}:
      hostName: {{ $nodeName }}.ctlplane.{{ $root.Values.cloudName }}.{{ $root.Values.baseDomain }}
      networkData:
        namespace: openstack
        name: {{ $nodeName }}.{{ $root.Values.baseDomain }}-network-data
      networks:
        - name: CtlPlane
          subnetName: {{ $group.az }}-subnet
          fixedIP: {{ $node.ctlplaneIP }}
        - name: InternalApi
          subnetName: {{ $group.az }}-subnet
        - name: Management
          subnetName: {{ $group.az }}-subnet
          fixedIP: {{ $node.managementIP }}
          defaultRoute: true
        - name: Storage
          subnetName: {{ $group.az }}-subnet
{{- if $group.includeStorage2 }}
        - name: Storage2
          subnetName: {{ $group.az }}-subnet
{{- end }}
        - name: Tenant
          subnetName: {{ $group.az }}-subnet
        - name: TenantPeering
          subnetName: {{ $group.az }}-subnet
{{- end }}
{{- end }}

  networkAttachments:
    - ctlplane
  nodeTemplate:
    ansibleSSHPrivateKeySecret: {{ $root.Values.cloudName }}-node-ssh-key
    extraMounts:
    - extraVolType: Ceph
      mounts:
      - mountPath: /etc/ceph
        name: ceph
        readOnly: true
      volumes:
      - name: ceph
        secret:
          secretName: ceph-conf-files
    networks:
      - name: CtlPlane
        subnetName: {{ $group.az }}-subnet
      - name: InternalApi
        subnetName: {{ $group.az }}-subnet
      - name: Management
        subnetName: {{ $group.az }}-subnet
        defaultRoute: true
      - name: Storage
        subnetName: {{ $group.az }}-subnet
{{- if $group.includeStorage2 }}
      - name: Storage2
        subnetName: {{ $group.az }}-subnet
{{- end }}
      - name: Tenant
        subnetName: {{ $group.az }}-subnet
      - name: TenantPeering
        subnetName: {{ $group.az }}-subnet
    managementNetwork: ctlplane
    ansible:
      ansibleUser: cloud-admin
      ansiblePort: 22
      ansibleVarsFrom:
        - prefix: subscription_manager_
          secretRef:
            name: {{ $root.Values.cloudName }}-subscription-secret
        - secretRef:
            name: {{ $root.Values.cloudName }}-registry-secret
      ansibleVars:
        edpm_bootstrap_release_version_package: "rhoso-release"
        edpm_kernel_args: "console=ttyS1,115200n8 usbcore.autosuspend=-1 mitigations=off tsc=nowatchdog{{ if eq $group.role "networker" }} intel_idle.max_cstate=1{{ end }}"
        edpm_bootstrap_command: |
          #dnf install -y http://satellite.lab.signal9.gg/pub/katello-ca-consumer-latest.noarch.rpm
          subscription-manager register --org {{ "{{ subscription_manager_org }}" }} --activationkey {{ "{{ subscription_manager_activation_key }}" }}
          subscription-manager release --set=9.4
          subscription-manager repos --disable=*
          subscription-manager repos --enable=rhel-9-for-x86_64-baseos-eus-rpms --enable=rhel-9-for-x86_64-appstream-eus-rpms --enable=rhel-9-for-x86_64-highavailability-eus-rpms --enable=fast-datapath-for-rhel-9-x86_64-rpms --enable=rhoso-18.0-for-rhel-9-x86_64-rpms --enable=rhceph-7-tools-for-rhel-9-x86_64-rpms
          # HP Gen8 iLO4 console: serial-getty on ttyS0+ttyS1 (VSP mapping varies per server) + disable USB autosuspend (virtual keyboard fade)
          for tty in ttyS0 ttyS1; do systemctl enable --now serial-getty@$tty.service || true; done
          for f in /sys/bus/usb/devices/*/power/control; do echo on > "$f" 2>/dev/null || true; done
          grubby --update-kernel=ALL --args="console=ttyS1,115200n8 usbcore.autosuspend=-1" || true
          printf 'ACTION=="add", SUBSYSTEM=="usb", ATTR{power/control}="on"\n' > /etc/udev/rules.d/90-ilo-usb-noautosuspend.rules
          udevadm control --reload-rules || true
        edpm_enable_chassis_gw: {{ $group.chassisGw }}
        edpm_ovn_availability_zones: ['{{ $group.az }}']
        edpm_ovn_bgp_agent_expose_tenant_networks: false
        edpm_frr_bgp_uplinks_scope: external
        edpm_frr_bgp_ipv4_src_network: tenantpeering
        # ipv4 unicast is needed so the node learns the XNA-HSC VTEP loopbacks
        # (192.168.153.26/.27) over the tenant-peering underlay; without it the
        # node routes VXLAN-return to the switch VTEP via mgmt and it blackholes.
        # learning_routes must be true or the node's rm-only-default route-map
        # only installs 0/0, not the learned VTEP /32s.
        edpm_frr_bgp_ipv4: true
        edpm_frr_bgp_ipv6: false
        edpm_frr_bgp_l2vpn: true
        edpm_frr_bgp_learning_routes: true
        # XNA-HSC uplink is a Cisco NX-OS vPC pair: it has no GTSM, so the
        # role default ttl-security (hops 1) makes it send TTL 1 which the
        # node's IP_MINTTL=255 drops -> sessions stuck. Disable GTSM.
        edpm_frr_bgp_neighbor_ttl_security_hops: 0
        # BFD is unsupported over vPC for a bonded/dual-homed peer (only the
        # vPC primary's BFD sustains). Drop BFD; use fast BGP timers instead.
        edpm_frr_bfd: false
        edpm_frr_bgp_neighbor_keepalive: 1
        edpm_frr_bgp_neighbor_holdtime: 3
        edpm_ovn_bgp_agent_exposing_method: vrf
        edpm_ovn_bgp_agent_evpn_nic: {{ $group.evpnNic }}
        edpm_ovn_bgp_agent_reconcile_interval: 120
        edpm_ovn_bgp_agent_evpn_local_ip: "{{ "{{ lookup('vars', 'tenantpeering_ip') }}" }}"
        timesync_ntp_servers:
          - hostname: 172.18.0.79
          - hostname: 172.18.42.10
          - hostname: 172.18.42.11
        edpm_frr_bgp_asn: {{ $group.asn }}
        edpm_ovn_bgp_agent_bgp_as: {{ $group.asn }}
        edpm_ovn_bridge_mappings:
          - 'datacentre:br-ex'
          - '{{ $group.bridgeVlanTag }}:br-{{ $group.bridgeVlanTag }}'
          - 'bgp-physnet:br-bgp'
        edpm_frr_bgp_peers:
{{- range $group.bgpPeers }}
          - {{ . }}
{{- end }}
        edpm_frr_bgp_l2vpn_peers:
{{- range $group.bgpL2vpnPeers }}
          - {{ . }}
{{- end }}
        edpm_chrony_ntp_servers:
          - 172.18.0.79
          - 172.18.42.10
          - 172.18.42.11
        # edpm_network_config
        # Default nic config template for a EDPM compute node
        # These vars are edpm_network_config role vars
        edpm_network_config_hide_sensitive_logs: false
        edpm_network_config_override: ""
        ctlplane_dns_nameservers:
          - {{ index $root.Values.networks.ctlplane.controlPlaneSegment.loadbalancerIPs 0 }}
        dns_search_domains:
          - ctlplane.{{ $root.Values.cloudName }}.{{ $root.Values.baseDomain }}
          - {{ $root.Values.baseDomain }}
        edpm_network_config_nmstate: true
        edpm_network_config_template: |
          ---
          {% set mtu_list = [ctlplane_mtu] %}
          {% set bond1_nets = ['Tenant', 'TenantPeering'] %}
          {% for network in role_networks %}
          {{ "{{ mtu_list.append(lookup('vars', networks_lower[network] ~ '_mtu')) }}" }}
          {%- endfor %}
          {% set min_viable_mtu = mtu_list | max %}
          network_config:
          - type: linux_bond
            name: bond0
            mtu: {{ "{{ min_viable_mtu }}" }}
            use_dhcp: false
            bonding_options: "mode=active-backup"
            members:
            - type: interface
              name: eno1
              mtu: {{ "{{ min_viable_mtu }}" }}
              primary: true
            - type: interface
              name: eno2
              mtu: {{ "{{ min_viable_mtu }}" }}
          - type: vlan
            device: bond0
            mtu: {{ "{{ ctlplane_mtu }}" }}
            vlan_id: {{ "{{ ctlplane_vlan_id }}" }}
            addresses:
            - ip_netmask: {{ "{{ ctlplane_ip }}/{{ ctlplane_cidr }}" }}
            dns_servers: {{ "{{ ctlplane_dns_nameservers }}" }}
            domain: {{ "{{ dns_search_domains }}" }}
            routes: {{ "{{ ctlplane_host_routes }}" }}

          {% for network in role_networks %}
          {% if network not in bond1_nets %}
          - type: vlan
            device: bond0
            mtu: {{ "{{ lookup('vars', networks_lower[network] ~ '_mtu') }}" }}
            vlan_id: {{ "{{ lookup('vars', networks_lower[network] ~ '_vlan_id') }}" }}
            addresses:
            - ip_netmask: {{ "{{ lookup('vars', networks_lower[network] ~ '_ip') }}/{{ lookup('vars', networks_lower[network] ~ '_cidr') }}" }}
          {% if network == 'Management' %}
            routes:
            - ip_netmask: 0.0.0.0/0
              next_hop: {{ "{{ management_gateway_ip }}" }}
              default: true
          {% else %}
            routes: {{ "{{ lookup('vars', networks_lower[network] ~ '_host_routes') }}" }}
          {% endif %}
          {% endif %}
          {% endfor %}
          - type: ovs_bridge
            name: br-{{ $group.bridgeVlanTag }}
            mtu: 9000
            members:
            - type: ovs_patch_port
              name: br-ex-patch
              bridge_name: br-{{ $group.bridgeVlanTag }}
              peer: p-{{ $group.bridgeVlanTag }}
          - type: ovs_bridge
            name: br-bgp
            mtu: 9000
          - type: ovs_bridge
            name: br-ex
            members:
            - type: ovs_patch_port
              name: p-{{ $group.bridgeVlanTag }}
              bridge_name: br-ex
              peer: br-ex-patch
            - type: linux_bond
              name: bond1
              mtu: 9000
              bonding_options: "mode=active-backup"
              members:
              - type: interface
                name: eno3
                mtu: 9000
                primary: true
              - type: interface
                name: eno3d1
                mtu: 9000
          {% for network in role_networks %}
          {% if network in bond1_nets %}
            - type: vlan
              mtu: {{ "{{ lookup('vars', networks_lower[network] ~ '_mtu') }}" }}
              vlan_id: {{ "{{ lookup('vars', networks_lower[network] ~ '_vlan_id') }}" }}
              addresses:
              - ip_netmask: {{ "{{ lookup('vars', networks_lower[network] ~ '_ip') }}/{{ lookup('vars', networks_lower[network] ~ '_cidr') }}" }}
              routes: {{ "{{ lookup('vars', networks_lower[network] ~ '_host_routes') }}" }}
          {% endif %}
          {% endfor %}
        # These vars are for the network config templates themselves and are
        # considered EDPM network defaults.
        neutron_physical_bridge_name: br-ex
        neutron_public_interface_name: vlan{{ "{{ tenant_vlan_id }}" }}
        role_networks:
        - InternalApi
        - Storage
        - Management
        - Tenant
        - TenantPeering
        networks_lower:
          Management: management
          InternalApi: internal_api
          Storage: storage
          Tenant: tenant
          TenantPeering: tenantpeering
        # edpm_nodes_validation
        edpm_nodes_validation_validate_controllers_icmp: false
        edpm_nodes_validation_validate_gateway_icmp: false
        gather_facts: false
        enable_debug: true
        # edpm firewall, change the allowed CIDR if needed
        edpm_sshd_configure_firewall: true
        edpm_sshd_allowed_ranges: ['172.18.0.0/16']
        # SELinux module
        edpm_selinux_mode: enforcing
{{- end }}
