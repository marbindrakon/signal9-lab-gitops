---
apiVersion: v1
kind: Namespace
metadata:
  name: openstack-operators
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: openstack-operators
  namespace: openstack-operators
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openstack-operator-sub
  namespace: openstack-operators
spec:
  channel: "stable-v1.0"
  name: openstack-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  config:
    env:
      # Validate the cherry-picked ACME public-TLS patch (18.0-fr5 + PR #1938).
      # Overrides the image used for the spawned openstack-operator-controller-manager,
      # which runs the patched internal/openstack control-plane reconciler.
      - name: OPERATOR_IMAGE_URL
        value: quay.signal9.gg/aaustin/openstack-operator-tls:0618202601
---
