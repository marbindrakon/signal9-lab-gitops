apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: push-ingress-cert
  namespace: clusters
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
    policy.open-cluster-management.io/standards: NIST SP 800-53
    policy.open-cluster-management.io/categories: CM Configuration Management
    policy.open-cluster-management.io/controls: CM-2 Baseline Configuration
spec:
  remediationAction: enforce
  disabled: false
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: push-ingress-cert
        spec:
          remediationAction: enforce
          severity: low
          namespaceSelector:
            exclude:
              - kube-*
            include:
              - openshift-ingress
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Secret
                metadata:
                  name: public-ingress-cert
                data: '{{hub copySecretData "clusters" ("X-ingress-crt" | replace "X" .ManagedClusterName) hub}}'
---
apiVersion: cluster.open-cluster-management.io/v1beta2
kind: ManagedClusterSetBinding
metadata:
  name: default
  namespace: clusters
spec:
  clusterSet: default
---
apiVersion: policy.open-cluster-management.io/v1
kind: PlacementBinding
metadata:
  name: binding-policy-ingress-cert
  namespace: clusters
placementRef:
  name: placement-policy-ingress-cert
  kind: Placement
  apiGroup: cluster.open-cluster-management.io
subjects:
  - name: push-ingress-cert
    kind: Policy
    apiGroup: policy.open-cluster-management.io
---
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: placement-policy-ingress-cert
  namespace: clusters
spec:
  predicates:
  - requiredClusterSelector:
      labelSelector:
        matchExpressions:
          - { key: spoke-gitops, operator: In, values: ["true"] }
          - { key: hcp-platform, operator: In, values: ["kubevirt", "agent"] }
