---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deprovision-hook
  namespace: {{ .Values.cluster.name }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deprovision-hook
  namespace: {{ .Values.cluster.name }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
- apiGroups: ["hive.openshift.io"]
  resources: ["clusterdeployments"]
  verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deprovision-hook
  namespace: {{ .Values.cluster.name }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: deprovision-hook
subjects:
- kind: ServiceAccount
  name: deprovision-hook
  namespace: {{ .Values.cluster.name }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: deprovision-wait
  namespace: {{ .Values.cluster.name }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  activeDeadlineSeconds: 3600
  template:
    spec:
      serviceAccountName: deprovision-hook
      restartPolicy: OnFailure
      containers:
      - name: wait
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          CLUSTER={{ .Values.cluster.name }}
          NS={{ .Values.cluster.name }}
          if oc get clusterdeployment "$CLUSTER" -n "$NS" &>/dev/null; then
            echo "Deleting ClusterDeployment $CLUSTER to trigger Hive deprovision..."
            oc delete clusterdeployment "$CLUSTER" -n "$NS"
            echo "Waiting for Hive deprovision to complete..."
            oc wait --for=delete clusterdeployment/"$CLUSTER" -n "$NS" --timeout=3600s
          else
            echo "ClusterDeployment $CLUSTER already gone, nothing to do."
          fi
